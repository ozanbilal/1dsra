name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy python

      - name: Tests
        run: python -m pytest

      - name: Core ES Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-es --out out/ci_bench_core_es --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core HYST Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-hyst --out out/ci_bench_core_hyst --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core Linear Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-linear --out out/ci_bench_core_linear --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core EQL Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-eql --out out/ci_bench_core_eql --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

  opensees-parity:
    if: ${{ vars.DSRA1D_CI_OPENSEES_EXE != '' }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: OpenSees Backend Probe
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
        run: |
          1dsra validate --config benchmarks/opensees-parity/cases/parity01.yml --check-backend

      - name: OpenSees Parity Campaign Gate
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
        run: |
          1dsra campaign \
            --suite opensees-parity \
            --out out/ci_bench_opensees_parity \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 3 \
            --verify-require-runs 3

      - name: Upload OpenSees Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-opensees-parity-output
          path: out/ci_bench_opensees_parity/**
