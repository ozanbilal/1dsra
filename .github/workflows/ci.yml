name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Release Policy Consistency
        run: python scripts/check_release_policy_consistency.py

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy python

      - name: Tests
        run: python -m pytest

      - name: Core ES Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-es --out out/ci_bench_core_es --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core HYST Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-hyst --out out/ci_bench_core_hyst --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core Linear Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-linear --out out/ci_bench_core_linear --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core EQL Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-eql --out out/ci_bench_core_eql --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

  opensees-parity-dedicated:
    needs: test
    runs-on: [self-hosted, linux, x64, opensees]
    timeout-minutes: 90
    env:
      DSRA1D_CI_OPENSEES_EXE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
      DSRA1D_CI_OPENSEES_VERSION_REGEX: ${{ vars.DSRA1D_CI_OPENSEES_VERSION_REGEX }}
      DSRA1D_CI_OPENSEES_SHA256: ${{ vars.DSRA1D_CI_OPENSEES_SHA256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Release Policy Consistency
        run: python scripts/check_release_policy_consistency.py

      - name: Validate Dedicated Runner Fingerprint Alignment
        run: |
          if [ -z "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            echo "DSRA1D_CI_OPENSEES_SHA256 is required for dedicated parity gate." >&2
            exit 1
          fi
          python scripts/check_fingerprint_alignment.py \
            --expected-sha "${DSRA1D_CI_OPENSEES_SHA256}" \
            --policy benchmarks/policies/release_signoff.yml \
            --matrix SCIENTIFIC_CONFIDENCE_MATRIX.md

      - name: OpenSees Backend Probe (Dedicated Runner)
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra validate \
            --config benchmarks/opensees-parity/cases/parity01.yml \
            --check-backend \
            "${args[@]}"

      - name: Release Signoff Campaign Gate (Dedicated Runner)
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra campaign \
            --suite release-signoff \
            --out out/ci_release-signoff \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 18 \
            --verify-require-runs 18 \
            --require-explicit-checks \
            "${args[@]}"

      - name: Strict Signoff Verdict (Dedicated Runner)
        run: |
          1dsra summarize \
            --input out/ci_release-signoff \
            --strict-signoff

      - name: Upload Dedicated Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-signoff-output
          path: out/ci_release-signoff/**
