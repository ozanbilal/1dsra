name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy python

      - name: Tests
        run: python -m pytest

      - name: Core ES Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-es --out out/ci_bench_core_es --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core HYST Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-hyst --out out/ci_bench_core_hyst --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core Linear Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-linear --out out/ci_bench_core_linear --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core EQL Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-eql --out out/ci_bench_core_eql --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

  opensees-parity-dedicated:
    if: ${{ vars.DSRA1D_CI_DEDICATED_OPENSEES == '1' }}
    needs: test
    runs-on: [self-hosted, linux, x64, opensees]
    timeout-minutes: 90
    env:
      DSRA1D_CI_OPENSEES_EXE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
      DSRA1D_CI_OPENSEES_VERSION_REGEX: ${{ vars.DSRA1D_CI_OPENSEES_VERSION_REGEX }}
      DSRA1D_CI_OPENSEES_SHA256: ${{ vars.DSRA1D_CI_OPENSEES_SHA256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: OpenSees Backend Probe (Dedicated Runner)
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra validate \
            --config benchmarks/opensees-parity/cases/parity01.yml \
            --check-backend \
            "${args[@]}"

      - name: OpenSees Parity Campaign Gate (Dedicated Runner)
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra campaign \
            --suite opensees-parity \
            --out out/ci_bench_opensees_parity_dedicated \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 6 \
            --verify-require-runs 6 \
            --require-explicit-checks \
            "${args[@]}"

      - name: Upload Dedicated Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-opensees-parity-dedicated-output
          path: out/ci_bench_opensees_parity_dedicated/**

  opensees-parity-openseespy:
    if: ${{ vars.DSRA1D_CI_OPENSEESPY == '1' }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install openseespy

      - name: OpenSeesPy Backend Probe
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: python
          DSRA1D_OPENSEES_EXTRA_ARGS_OVERRIDE: scripts/opensees_pyshim.py
        run: |
          1dsra validate --config benchmarks/opensees-parity/cases/parity01.yml --check-backend

      - name: OpenSeesPy Parity Campaign Gate
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: python
          DSRA1D_OPENSEES_EXTRA_ARGS_OVERRIDE: scripts/opensees_pyshim.py
        run: |
          1dsra campaign \
            --suite opensees-parity \
            --out out/ci_bench_opensees_parity_pyshim \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 3 \
            --verify-require-runs 3

      - name: Upload OpenSeesPy Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-opensees-parity-openseespy-output
          path: out/ci_bench_opensees_parity_pyshim/**

  opensees-parity:
    if: ${{ vars.DSRA1D_CI_OPENSEES_EXE != '' }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: OpenSees Backend Probe
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
        run: |
          1dsra validate --config benchmarks/opensees-parity/cases/parity01.yml --check-backend

      - name: OpenSees Parity Campaign Gate
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
        run: |
          1dsra campaign \
            --suite opensees-parity \
            --out out/ci_bench_opensees_parity \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 3 \
            --verify-require-runs 3

      - name: Upload OpenSees Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-opensees-parity-output
          path: out/ci_bench_opensees_parity/**
