name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy python

      - name: Tests
        run: python -m pytest

      - name: Core ES Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-es --out out/ci_bench_core_es --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core HYST Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-hyst --out out/ci_bench_core_hyst --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0
