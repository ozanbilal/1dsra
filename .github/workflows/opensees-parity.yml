name: opensees-parity

on:
  workflow_dispatch:
    inputs:
      opensees_executable:
        description: "Absolute path or command name for OpenSees executable"
        required: true
        default: "OpenSees"
      opensees_extra_args:
        description: "Optional extra args for executable (JSON list or shell string)"
        required: false
        default: ""
      fail_on_skip:
        description: "Fail workflow if any parity case is skipped"
        required: false
        default: "true"
      require_runs:
        description: "Minimum number of executed (non-skipped) parity runs"
        required: false
        default: "6"
      min_execution_coverage:
        description: "Minimum executed case coverage ratio in [0,1]"
        required: false
        default: "1.0"
      require_backend_version_regex:
        description: "Optional regex requirement for backend version string"
        required: false
        default: ""
      require_backend_sha256:
        description: "Optional backend binary sha256 requirement"
        required: false
        default: ""

jobs:
  parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check OpenSees Availability
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ inputs.opensees_executable }}
          DSRA1D_OPENSEES_EXTRA_ARGS_OVERRIDE: ${{ inputs.opensees_extra_args }}
        run: |
          args=()
          if [ -n "${{ inputs.require_backend_version_regex }}" ]; then
            args+=(--require-backend-version-regex "${{ inputs.require_backend_version_regex }}")
          fi
          if [ -n "${{ inputs.require_backend_sha256 }}" ]; then
            args+=(--require-backend-sha256 "${{ inputs.require_backend_sha256 }}")
          fi
          1dsra validate --config benchmarks/opensees-parity/cases/parity01.yml --check-backend "${args[@]}" || true

      - name: Run OpenSees Parity Campaign
        env:
          DSRA1D_OPENSEES_EXE_OVERRIDE: ${{ inputs.opensees_executable }}
          DSRA1D_OPENSEES_EXTRA_ARGS_OVERRIDE: ${{ inputs.opensees_extra_args }}
        run: |
          args=()
          if [ -n "${{ inputs.require_backend_version_regex }}" ]; then
            args+=(--require-backend-version-regex "${{ inputs.require_backend_version_regex }}")
          fi
          if [ -n "${{ inputs.require_backend_sha256 }}" ]; then
            args+=(--require-backend-sha256 "${{ inputs.require_backend_sha256 }}")
          fi
          if [ "${{ inputs.fail_on_skip }}" = "true" ]; then
            1dsra campaign \
              --suite opensees-parity \
              --out out/opensees-parity \
              --require-opensees \
              --min-execution-coverage ${{ inputs.min_execution_coverage }} \
              --fail-on-skip \
              --require-runs ${{ inputs.require_runs }} \
              --verify-require-runs ${{ inputs.require_runs }} \
              --require-explicit-checks \
              "${args[@]}"
          else
            1dsra campaign \
              --suite opensees-parity \
              --out out/opensees-parity \
              --require-opensees \
              --min-execution-coverage ${{ inputs.min_execution_coverage }} \
              --require-runs ${{ inputs.require_runs }} \
              --verify-require-runs ${{ inputs.require_runs }} \
              --require-explicit-checks \
              "${args[@]}"
          fi

      - name: Publish Campaign Summary
        run: |
          cat out/opensees-parity/campaign_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Parity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensees-parity-output
          path: out/opensees-parity/**
