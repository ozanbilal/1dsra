name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release-signoff:
    runs-on: [self-hosted, linux, x64, opensees]
    timeout-minutes: 90
    env:
      DSRA1D_CI_OPENSEES_EXE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
      DSRA1D_CI_OPENSEES_VERSION_REGEX: ${{ vars.DSRA1D_CI_OPENSEES_VERSION_REGEX }}
      DSRA1D_CI_OPENSEES_SHA256: ${{ vars.DSRA1D_CI_OPENSEES_SHA256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Release Signoff Inputs
        run: |
          if [ -z "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            echo "DSRA1D_CI_OPENSEES_SHA256 is required for release signoff." >&2
            exit 1
          fi
          python scripts/check_fingerprint_alignment.py \
            --expected-sha "${DSRA1D_CI_OPENSEES_SHA256}" \
            --policy benchmarks/policies/release_signoff.yml \
            --matrix SCIENTIFIC_CONFIDENCE_MATRIX.md

      - name: OpenSees Release Backend Probe
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra validate \
            --config benchmarks/opensees-parity/cases/parity01.yml \
            --check-backend \
            "${args[@]}"

      - name: Release Signoff Campaign Gate
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra campaign \
            --suite release-signoff \
            --out out/release-signoff \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 18 \
            --verify-require-runs 18 \
            --require-explicit-checks \
            "${args[@]}"

      - name: Strict Signoff Summary
        run: |
          1dsra summarize \
            --input out/release-signoff \
            --strict-signoff

      - name: Validate Release Signoff Checklist (Machine Checks)
        run: |
          python scripts/check_release_signoff.py \
            --campaign-dir out/release-signoff \
            --matrix SCIENTIFIC_CONFIDENCE_MATRIX.md \
            --require-fingerprint

      - name: Upload Release Signoff Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signoff-output
          path: out/release-signoff/**

  build-and-release:
    needs: release-signoff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install build twine

      - name: Validate Release Tag Version
        run: python scripts/check_release_tag.py --tag "${{ github.ref_name }}"

      - name: Validate Changelog Section
        run: python scripts/check_changelog.py --tag "${{ github.ref_name }}"

      - name: Quality Gate
        run: |
          python -m ruff check .
          python -m mypy python
          python -m pytest

      - name: Build Distributions
        run: python -m build

      - name: Verify Distributions
        run: twine check dist/*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
