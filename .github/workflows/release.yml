name: release

on:
  push:
    tags:
      - "v*"

jobs:
  opensees-parity-release:
    runs-on: [self-hosted, linux, x64, opensees]
    timeout-minutes: 90
    env:
      DSRA1D_CI_OPENSEES_EXE: ${{ vars.DSRA1D_CI_OPENSEES_EXE }}
      DSRA1D_CI_OPENSEES_VERSION_REGEX: ${{ vars.DSRA1D_CI_OPENSEES_VERSION_REGEX }}
      DSRA1D_CI_OPENSEES_SHA256: ${{ vars.DSRA1D_CI_OPENSEES_SHA256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: OpenSees Release Backend Probe
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra validate \
            --config benchmarks/opensees-parity/cases/parity01.yml \
            --check-backend \
            "${args[@]}"

      - name: OpenSees Release Parity Campaign Gate
        run: |
          export DSRA1D_OPENSEES_EXE_OVERRIDE="${DSRA1D_CI_OPENSEES_EXE:-OpenSees}"
          args=()
          if [ -n "${DSRA1D_CI_OPENSEES_VERSION_REGEX}" ]; then
            args+=(--require-backend-version-regex "${DSRA1D_CI_OPENSEES_VERSION_REGEX}")
          fi
          if [ -n "${DSRA1D_CI_OPENSEES_SHA256}" ]; then
            args+=(--require-backend-sha256 "${DSRA1D_CI_OPENSEES_SHA256}")
          fi
          1dsra campaign \
            --suite opensees-parity \
            --out out/release-opensees-parity \
            --require-opensees \
            --min-execution-coverage 1.0 \
            --fail-on-skip \
            --require-runs 6 \
            --verify-require-runs 6 \
            --require-explicit-checks \
            "${args[@]}"

  build-and-release:
    needs: opensees-parity-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install build twine

      - name: Validate Release Tag Version
        run: python scripts/check_release_tag.py --tag "${{ github.ref_name }}"

      - name: Validate Changelog Section
        run: python scripts/check_changelog.py --tag "${{ github.ref_name }}"

      - name: Quality Gate
        run: |
          python -m ruff check .
          python -m mypy python
          python -m pytest

      - name: Core ES Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-es --out out/release-core-es --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core HYST Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-hyst --out out/release-core-hyst --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core Linear Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-linear --out out/release-core-linear --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Core EQL Campaign Gate
        run: python -m dsra1d.cli.main campaign --suite core-eql --out out/release-core-eql --require-runs 3 --verify-require-runs 3 --min-execution-coverage 1.0

      - name: Build Distributions
        run: python -m build

      - name: Verify Distributions
        run: twine check dist/*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
