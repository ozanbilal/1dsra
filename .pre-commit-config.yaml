repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.8
  - repo: https://github.com/pytest-dev/pytest
    rev: 9.0.2
    hooks:
      - id: pytest
        additional_dependencies:
          - pytest-cov
        args: ["-q"]
        pass_filenames: false
