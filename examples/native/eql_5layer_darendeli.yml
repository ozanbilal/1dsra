# GeoWave Native Example: EQL 5-Layer Mixed Profile
# Reference curves: Darendeli (2001) calibrated MKZ
# Boundary: Elastic halfspace
# Solver: Equivalent-Linear (iterative strain-compatible)

project_name: eql-5layer-darendeli

profile:
  layers:
    - name: SoftSand
      thickness_m: 3.0
      vs_m_s: 120.0
      unit_weight_kN_m3: 16.5
      material: mkz
      calibration:
        plasticity_index: 0
        ocr: 1.0
        mean_effective_stress_kpa: 25.0

    - name: SiltyClay
      thickness_m: 5.0
      vs_m_s: 180.0
      unit_weight_kN_m3: 17.5
      material: mkz
      calibration:
        plasticity_index: 15
        ocr: 1.0
        mean_effective_stress_kpa: 65.0

    - name: StiffClay
      thickness_m: 7.0
      vs_m_s: 250.0
      unit_weight_kN_m3: 18.5
      material: mkz
      calibration:
        plasticity_index: 30
        ocr: 1.5
        mean_effective_stress_kpa: 120.0

    - name: MediumSand
      thickness_m: 10.0
      vs_m_s: 350.0
      unit_weight_kN_m3: 19.5
      material: mkz
      calibration:
        plasticity_index: 15
        ocr: 1.0
        mean_effective_stress_kpa: 200.0

    - name: DenseSand
      thickness_m: 15.0
      vs_m_s: 500.0
      unit_weight_kN_m3: 21.0
      material: mkz
      calibration:
        plasticity_index: 0
        ocr: 1.0
        mean_effective_stress_kpa: 350.0

  halfspace:
    vs: 760.0
    unit_weight: 22.0

motion:
  file: "../motions/sample_motion.csv"
  units: "m/s2"

analysis:
  solver_backend: eql
  boundary_condition: elastic_halfspace
  f_max: 25.0
  dt: 0.005
  damping_mode: frequency_independent
  convergence_tol: 0.03
  strain_ratio: 0.65
  relaxation: 0.6
  max_iterations: 15

output:
  formats:
    - hdf5
    - sqlite
    - csv
