# StrataWave Native Example: Linear 3-Layer Sand Profile
# Reference curves: Seed-Idriss Mean (1970)
# Boundary: Rigid base
# Solver: Linear SH (implicit Newmark)

project_name: linear-3layer-sand

profile:
  layers:
    - name: LooseSand
      thickness_m: 5.0
      vs_m_s: 150.0
      unit_weight_kN_m3: 17.0
      material: mkz
      material_params:
        gmax: 38250.0
        gamma_ref: 0.035
        damping_min: 0.005
        damping_max: 0.21
        reload_factor: 2.0

    - name: MediumSand
      thickness_m: 10.0
      vs_m_s: 250.0
      unit_weight_kN_m3: 18.5
      material: mkz
      material_params:
        gmax: 117860.0
        gamma_ref: 0.035
        damping_min: 0.005
        damping_max: 0.21
        reload_factor: 2.0

    - name: DenseSand
      thickness_m: 15.0
      vs_m_s: 400.0
      unit_weight_kN_m3: 20.0
      material: mkz
      material_params:
        gmax: 326200.0
        gamma_ref: 0.035
        damping_min: 0.005
        damping_max: 0.21
        reload_factor: 2.0

  halfspace:
    vs: 760.0
    unit_weight: 22.0

motion:
  file: "../motions/sample_motion.csv"
  units: "m/s2"

analysis:
  solver_backend: linear
  boundary_condition: rigid
  f_max: 25.0
  dt: 0.005
  damping_mode: frequency_independent

output:
  formats:
    - hdf5
    - sqlite
    - csv
