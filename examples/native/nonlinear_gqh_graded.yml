# StrataWave Native Example: Nonlinear GQH 5-Layer Graded Profile
# Reference curves: Darendeli-calibrated GQH
# Boundary: Elastic halfspace
# Solver: Nonlinear implicit Newmark

project_name: nonlinear-gqh-graded

profile:
  layers:
    - name: VeryLooseSand
      thickness_m: 3.0
      vs_m_s: 100.0
      unit_weight_kN_m3: 16.0
      material: gqh
      calibration:
        plasticity_index: 0
        ocr: 1.0
        mean_effective_stress_kpa: 20.0

    - name: SiltySand
      thickness_m: 5.0
      vs_m_s: 160.0
      unit_weight_kN_m3: 17.0
      material: gqh
      calibration:
        plasticity_index: 10
        ocr: 1.0
        mean_effective_stress_kpa: 55.0

    - name: ClayeySilt
      thickness_m: 7.0
      vs_m_s: 230.0
      unit_weight_kN_m3: 18.0
      material: gqh
      calibration:
        plasticity_index: 20
        ocr: 1.5
        mean_effective_stress_kpa: 100.0

    - name: MediumDenseSand
      thickness_m: 10.0
      vs_m_s: 320.0
      unit_weight_kN_m3: 19.0
      material: gqh
      calibration:
        plasticity_index: 10
        ocr: 1.0
        mean_effective_stress_kpa: 180.0

    - name: DenseSandGravel
      thickness_m: 15.0
      vs_m_s: 450.0
      unit_weight_kN_m3: 20.5
      material: gqh
      calibration:
        plasticity_index: 0
        ocr: 1.0
        mean_effective_stress_kpa: 300.0

  halfspace:
    vs: 800.0
    unit_weight: 22.0

motion:
  file: "../motions/sample_motion.csv"
  units: "m/s2"

analysis:
  solver_backend: nonlinear
  boundary_condition: elastic_halfspace
  f_max: 25.0
  dt: 0.005
  damping_mode: frequency_independent
  nonlinear_substeps: 4
  integration_scheme: newmark

output:
  formats:
    - hdf5
    - sqlite
    - csv
