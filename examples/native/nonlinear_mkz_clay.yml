# StrataWave Native Example: Nonlinear MKZ 3-Layer Clay
# Reference curves: Vucetic-Dobry PI=30 (1991)
# Boundary: Rigid base
# Solver: Nonlinear implicit Newmark

project_name: "Nonlinear MKZ Clay PI=30"

profile:
  layers:
    - thickness: 5.0
      vs: 130.0
      unit_weight: 17.0
      material: mkz
      material_params:
        gmax: 29310.0     # (17/9.81) * 130^2
        gamma_ref: 0.09    # Vucetic-Dobry PI=30 reference strain
        damping_min: 0.01
        damping_max: 0.15
        reload_factor: 1.8
        g_reduction_min: 0.03

    - thickness: 8.0
      vs: 200.0
      unit_weight: 18.0
      material: mkz
      material_params:
        gmax: 73420.0     # (18/9.81) * 200^2
        gamma_ref: 0.09
        damping_min: 0.01
        damping_max: 0.15
        reload_factor: 1.8
        g_reduction_min: 0.03

    - thickness: 12.0
      vs: 320.0
      unit_weight: 19.5
      material: mkz
      material_params:
        gmax: 203750.0    # (19.5/9.81) * 320^2
        gamma_ref: 0.09
        damping_min: 0.01
        damping_max: 0.12
        reload_factor: 1.8
        g_reduction_min: 0.02

  halfspace:
    vs: 760.0
    unit_weight: 22.0

motion:
  file: "../motions/sample_motion.csv"
  units: "m/s2"

analysis:
  solver_backend: nonlinear
  boundary_condition: rigid
  f_max: 25.0
  dt: 0.005
  damping_mode: frequency_independent
  nonlinear_substeps: 4
  integration_scheme: newmark

output:
  formats:
    - hdf5
    - sqlite
    - csv
