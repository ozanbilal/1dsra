# GeoWave Native Example: Nonlinear MKZ 3-Layer Clay
# Reference curves: Vucetic-Dobry PI=30 (1991)
# Boundary: Rigid base
# Solver: Nonlinear implicit Newmark

project_name: nonlinear-mkz-clay

profile:
  layers:
    - name: SoftClay
      thickness_m: 5.0
      vs_m_s: 130.0
      unit_weight_kN_m3: 17.0
      material: mkz
      material_params:
        gmax: 29310.0
        gamma_ref: 0.09
        damping_min: 0.01
        damping_max: 0.15
        reload_factor: 1.8
        g_reduction_min: 0.03

    - name: MediumClay
      thickness_m: 8.0
      vs_m_s: 200.0
      unit_weight_kN_m3: 18.0
      material: mkz
      material_params:
        gmax: 73420.0
        gamma_ref: 0.09
        damping_min: 0.01
        damping_max: 0.15
        reload_factor: 1.8
        g_reduction_min: 0.03

    - name: StiffClay
      thickness_m: 12.0
      vs_m_s: 320.0
      unit_weight_kN_m3: 19.5
      material: mkz
      material_params:
        gmax: 203750.0
        gamma_ref: 0.09
        damping_min: 0.01
        damping_max: 0.12
        reload_factor: 1.8
        g_reduction_min: 0.02

  halfspace:
    vs: 760.0
    unit_weight: 22.0

motion:
  file: "../motions/sample_motion.csv"
  units: "m/s2"

analysis:
  solver_backend: nonlinear
  boundary_condition: rigid
  f_max: 25.0
  dt: 0.005
  damping_mode: frequency_independent
  nonlinear_substeps: 4
  integration_scheme: newmark

output:
  formats:
    - hdf5
    - sqlite
    - csv
